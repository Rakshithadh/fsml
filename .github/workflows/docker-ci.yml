name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python (optional but useful)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install dependencies (for validation)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Build Docker image
    - name: Build Docker image
      run: |
        docker build -t deepfake-app .

    # 5. Run container (test if it starts)
    - name: Run Docker container
      run: |
        docker run -d -p 8000:8000 --name test-container deepfake-app
        sleep 10

    # 6. Check if API is up
    - name: Test API endpoint
      run: |
        curl -f http://localhost:8000/docs || exit 1

    # 7. Stop container
    - name: Stop container
      run: docker stop test-container